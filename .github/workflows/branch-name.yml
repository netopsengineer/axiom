name: Branch Name

# Branch names do not drive releases; PR titles do. This check only keeps PR
# source branches predictable for humans and autonomous agents.
on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  branch-name:
    name: Branch name
    runs-on: ubuntu-latest
    steps:
      - name: Configure git defaults
        run: git config --global init.defaultBranch main
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Validate branch name
        env:
          PR_BRANCH: ${{ github.head_ref }}
        run: node .github/scripts/check-branch-name.mjs
