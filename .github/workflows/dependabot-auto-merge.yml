name: Auto-merge Dependabot

# Enables auto-merge on Dependabot PRs; they land once the required Validate
# checks pass. Requires "Allow auto-merge" (Settings > General) and a branch
# protection rule / ruleset on main that requires the Validate checks — without
# required checks, auto-merge would land PRs before CI runs.
#
# Dependabot PRs DO trigger workflows (unlike GITHUB_TOKEN-created ones), so
# no dispatch dance is needed here.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.repository == github.event.pull_request.head.repo.full_name
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Enable auto-merge
        # Auto-merges all update types (maximally hands-off). To hold majors back
        # for manual review, uncomment the guard below:
        # if: steps.meta.outputs.update-type != 'version-update:semver-major'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"
