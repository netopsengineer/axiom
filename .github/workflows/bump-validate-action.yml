name: Bump validate-plugins action

# The official validate-plugins action (anthropics/claude-plugins-community)
# publishes no release tags, so Dependabot can't track it. This is our
# stand-in: daily, it re-pins the SHA in the local validate-plugins wrapper to
# the latest upstream commit, opens a PR with the repo GitHub App token so PR
# checks trigger normally, dispatches an extra Validate pass against the branch,
# and enables auto-merge only after required checks, including validator smoke
# tests, pass on the bumped branch.

on:
  schedule:
    - cron: "17 6 * * *" # daily 06:17 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bump-validate-action
  cancel-in-progress: false

env:
  ACTION_REPO: anthropics/claude-plugins-community
  PIN_FILE: .github/actions/validate-plugins/action.yml
  UPSTREAM_DIR: .github/actions/validate-plugins/upstream
  BRANCH: chore/bump-validate-plugins-action

jobs:
  bump:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
      actions: write # gh workflow run validate.yml --ref <branch>
    steps:
      - name: Configure git defaults
        run: git config --global init.defaultBranch main
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Mint GitHub App token
        id: app-token
        env:
          APP_ID: ${{ vars.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          TOKEN_PERMISSIONS: '{"contents":"write","pull_requests":"write"}'
        run: node .github/scripts/create-app-token.mjs

      - name: Re-pin to latest upstream SHA
        id: bump
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          latest="$(gh api "repos/$ACTION_REPO/commits/HEAD" --jq '.sha')"
          current="$(grep -oE 'validate-plugins@[0-9a-f]{40}' "$PIN_FILE" | head -1 | cut -d@ -f2)"
          echo "current=$current"
          echo "latest=$latest"
          if [ -z "$current" ]; then
            echo "::error::Could not find a pinned validate-plugins SHA in $PIN_FILE"
            exit 1
          fi
          if [ "$current" = "$latest" ]; then
            echo "Already at latest; nothing to do."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          tmp="$(mktemp -d)"
          git -C "$tmp" init
          git -C "$tmp" remote add origin "https://github.com/${ACTION_REPO}.git"
          git -C "$tmp" fetch --depth=1 origin "$latest"
          git -C "$tmp" checkout --detach FETCH_HEAD
          rm -rf "${UPSTREAM_DIR:?}/lib" "${UPSTREAM_DIR:?}/scripts"
          mkdir -p "$UPSTREAM_DIR"
          cp -R "$tmp/.github/actions/validate-plugins/lib" "$tmp/.github/actions/validate-plugins/scripts" "$UPSTREAM_DIR/"
          sed -i "s/validate-plugins@${current}/validate-plugins@${latest}/" "$PIN_FILE"
          {
            echo "changed=true"
            echo "latest=$latest"
            echo "short=${latest:0:7}"
          } >> "$GITHUB_OUTPUT"

      - name: Open / update PR and enable auto-merge
        if: steps.bump.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          WORKFLOW_TOKEN: ${{ github.token }}
          LATEST: ${{ steps.bump.outputs.latest }}
          SHORT: ${{ steps.bump.outputs.short }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add "$PIN_FILE" "$UPSTREAM_DIR"
          git commit -m "ci: bump validate-plugins action to ${SHORT}"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$BRANCH"

          body="$(mktemp)"
          cat > "$body" <<EOF
          Automated re-pin of the local validate-plugins wrapper to latest upstream commit \`${LATEST}\`.

          - Upstream commit: https://github.com/${ACTION_REPO}/commit/${LATEST}
          - Upstream source path: \`${ACTION_REPO}/.github/actions/validate-plugins\`
          - Local copied path: \`${UPSTREAM_DIR}\`
          - Local pin file: \`${PIN_FILE}\`

          Auto-merges once required checks pass, including the repo-owned validator smoke tests in \`validate.yml\`.
          EOF

          # Create or update the PR. Required checks guard the validator bump:
          # Validate includes repo-owned smoke tests for known-good, known-bad,
          # and fail-on-warnings behavior before auto-merge can land it.
          pr_number="$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')"
          if [ -z "$pr_number" ]; then
            gh pr create --head "$BRANCH" --base main \
              --title "ci: bump validate-plugins action to ${SHORT}" \
              --body-file "$body"
          else
            gh pr edit "$pr_number" \
              --title "ci: bump validate-plugins action to ${SHORT}" \
              --body-file "$body"
          fi

          # The App-created PR triggers normal PR checks. Dispatch Validate too,
          # so this run immediately exercises the bumped local wrapper.
          GH_TOKEN="$WORKFLOW_TOKEN" gh workflow run validate.yml --ref "$BRANCH"

          # Land it hands-off once required checks are green.
          gh pr merge --auto --squash "$BRANCH" \
            || echo "::warning::Could not enable auto-merge — enable 'Allow auto-merge' in repo settings and protect main with the Validate checks."
