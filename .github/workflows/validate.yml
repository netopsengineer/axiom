name: Validate

# Runs on every PR (no path filter) so it is always a reliable required
# status check for branch protection / auto-merge, plus a post-merge sanity
# pass on main. Both jobs are fast.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Configure git defaults
        run: git config --global init.defaultBranch main
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
          GITLEAKS_VERSION: 8.30.1
          NODE_OPTIONS: --no-deprecation

  plugins:
    name: Plugin manifests
    runs-on: ubuntu-latest
    steps:
      - name: Configure git defaults
        run: git config --global init.defaultBranch main
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      # Canonical validator: runs `claude plugin validate` (source-of-truth
      # schema check) plus the marketplace invariant lints. The local wrapper
      # keeps the untagged upstream action SHA-pinned and allows bumps without
      # editing this workflow file.
      - uses: ./.github/actions/validate-plugins
        with:
          marketplace-path: .claude-plugin/marketplace.json
          warn-invariants: ""
          fail-on-warnings: "true"
          skip-external: "true" # every entry is a local folder source
          claude-cli-version: latest
      # Node/npm are already on PATH from the validate-plugins composite
      # action's own setup-node step above.
      - name: Validator smoke tests
        run: npm run test:validate-plugins

  markdown:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - name: Configure git defaults
        run: git config --global init.defaultBranch main
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      # Uses the repo's .markdownlint-cli2.jsonc (which sets gitignore: true,
      # so node_modules and ignored DEMO-*.md are skipped automatically).
      - uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25 # v24.0.0
        with:
          globs: "**/*.md"

  repository:
    name: Repository checks
    runs-on: ubuntu-latest
    steps:
      - name: Configure git defaults
        run: git config --global init.defaultBranch main
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci --loglevel=error
      - run: npm run check:repo
      - run: npm run lint:yaml
      - run: npm run lint:spelling
      - run: npm run lint:links

  workflows:
    name: Workflow security lint
    runs-on: ubuntu-latest
    steps:
      - name: Configure git defaults
        run: git config --global init.defaultBranch main
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci --loglevel=error
      - run: npm run check:precommit:security

  javascript:
    name: JavaScript lint
    runs-on: ubuntu-latest
    steps:
      - name: Configure git defaults
        run: git config --global init.defaultBranch main
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      # Biome lint + format check (read-only `biome ci`). Config in biome.jsonc,
      # scoped to the repo's hand-written JS. Installed via npm, so there is no
      # extra action to SHA-pin — reuses the pinned checkout + setup-node above.
      - run: npm ci --loglevel=error
      - run: npm run docs:readme:check
      - run: npm run lint
      # Unit tests for the CI/automation helper scripts (audit gate,
      # audit-fix classifier) — required here so a regression fails the PR
      # instead of only surfacing later in scheduled security automation.
      - run: npm run test:automation
