name: Dependency audit

# npm audit queries a live advisory feed, so a newly-disclosed advisory unrelated
# to any PR could otherwise turn a required check red and block all merges. This
# workflow keeps audit as an advisory signal, not a merge gate: it runs on a daily
# schedule (offset from the bump-validate-action cron) plus manual dispatch, and is
# intentionally NOT wired into pull_request, so it produces no PR status check.
#
# The audit runs through .github/scripts/check-npm-audit.mjs (npm run audit:ci),
# which fails only on at/above-high advisories that are not covered by a current
# .github/npm-audit-allowlist.json entry. Fixable advisories are auto-patched by
# dependency-audit-fix.yml; only genuinely unfixable ones (e.g. bundled inside npm)
# are allowlisted, each with an expiry so it is re-reviewed.

on:
  schedule:
    - cron: "37 6 * * *" # daily 06:37 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Configure git defaults
        run: git config --global init.defaultBranch main
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci --loglevel=error
      - run: npm run audit:ci
