name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

# The release runs under a GitHub App token (see the app-token step below), which
# is the bypass actor on the `main` ruleset and carries its own contents/issues/PR
# write scopes. The built-in GITHUB_TOKEN does no writing here, so it stays read-only.
permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest
    steps:
      - name: Configure git defaults
        run: git config --global init.defaultBranch main
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # semantic-release needs full history + tags
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24 # current LTS; semantic-release@25 needs ^22.14 || >=24.10
          cache: npm
      # Mint a short-lived token from the axiom-release-bot GitHub App. The
      # built-in GITHUB_TOKEN (github-actions[bot]) is not an admin and is rejected
      # by branch protection; the App is the bypass actor on the `main` ruleset, so
      # semantic-release can push the version-bump commit + tag to protected main.
      - name: Mint GitHub App token
        id: app-token
        env:
          APP_ID: ${{ vars.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          TOKEN_PERMISSIONS: '{"contents":"write","issues":"write","pull_requests":"write"}'
        run: node .github/scripts/create-app-token.mjs
      - name: Configure git credentials
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
      - run: npm ci --loglevel=error
      - name: Release changed plugins
        run: |
          set -euo pipefail
          for dir in plugins/*/; do
            name="$(basename "$dir")"
            echo "::group::semantic-release: $name"
            ( cd "$dir" && npx --no-install semantic-release )
            echo "::endgroup::"
          done
        env:
          # App-minted token (not the default GITHUB_TOKEN) — required to push to
          # protected main and to create the tag, Release, and success comments.
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
