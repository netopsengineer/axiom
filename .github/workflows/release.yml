name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # push the version-bump commit + tag, create the Release
  issues: write # semantic-release comments on released issues
  pull-requests: write # semantic-release comments on released PRs

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # semantic-release needs full history + tags
          persist-credentials: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24 # current LTS; semantic-release@25 needs ^22.14 || >=24.10
          cache: npm
      - run: npm ci
      - run: npm run release
        env:
          # Built-in token — no PAT/NPM_TOKEN needed (no npm publish).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
