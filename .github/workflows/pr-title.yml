name: PR Title

# The repo squash-merges, so the PR title becomes the release commit subject and
# semantic-release derives the version bump from it (release.config.js). Nothing
# else checks that title until the analyzer runs on main — by which point a bad
# title silently yields no release or the wrong bump. This gate enforces it at PR
# time, using the same header pattern as release.config.js so the two agree.
on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read

jobs:
  conventional-title:
    name: Conventional Commit title
    runs-on: ubuntu-latest
    steps:
      - name: Configure git defaults
        run: git config --global init.defaultBranch main
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      # The title is passed via env (never interpolated into the command) so an
      # attacker-controlled PR title cannot inject shell. Node is preinstalled on
      # the runner; the validator lives beside the other release scripts.
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: node .github/scripts/check-pr-title.mjs
